<div class="card mb-4">
  <div class="card-body">
    <h5 class="card-title">Nueva Ciudad</h5>

    <div class="mb-3">
      <label for="cityName" class="form-label">Nombre de la ciudad</label>
      <input
        id="cityName"
        type="text"
        class="form-control"
        [(ngModel)]="cityName"
        placeholder="Ej: Medellín">
    </div>

    <div class="mb-3">
      <label for="countrySelect" class="form-label">País</label>
      <select id="countrySelect" class="form-select" [(ngModel)]="selectedCountryId">
        <option [ngValue]="null" disabled>Seleccione un país</option>
        @for (country of countries; track country.id) {
          <option [ngValue]="country.id">{{ country.name }}</option>
        }
      </select>
    </div>

    <div class="d-flex gap-2">
      <button class="btn btn-primary" [disabled]="!isFormValid()" (click)="onSave()">
        Guardar
      </button>
      <button class="btn btn-outline-secondary" (click)="onCancel()">
        Cancelar
      </button>
    </div>

  </div>
</div>
